%YAML:1.0

#common parameters
#support: 1 imu 1 cam; 1 imu 2 cam: 2 cam; 
imu: 1         
num_of_cam: 2


imu_topic: "/mavros/imu/data"
image0_topic: "/camera/infra1/image_rect_raw"
image1_topic: "/camera/infra2/image_rect_raw"


output_path: "/home/nvidia/vins_output"


cam0_calib: "left.yaml"
cam1_calib: "right.yaml"
image_width: 640
image_height: 480
   

# Extrinsic parameter between IMU and Camera.
estimate_extrinsic: 0   # 0  Have an accurate extrinsic parameters. We will trust the following imu^R_cam, imu^T_cam, don't change it.
                        # 1  Have an initial guess about extrinsic parameters. We will optimize around your initial guess.

body_T_cam0: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   data: [ 4.7411000202683962e-03, 2.9642562385463363e-02,
       9.9954931867608332e-01, 5.9354389827203972e-02,
       -9.9875349774050504e-01, 4.9807847462912225e-02,
       3.2602273262435223e-03, 2.7906395900271452e-02,
       -4.9688758504367478e-02, -9.9831883525571918e-01,
       2.9841756851088252e-02, 4.3355047077579083e-02, 0., 0., 0., 1. ]
body_T_cam1: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   data: [ 5.0140119851134202e-03, 2.9935790598650543e-02,
       9.9953924791628224e-01, 6.0217803911660484e-02,
       -9.9875731234673393e-01, 4.9713501697376761e-02,
       3.5211905534726744e-03, -2.0197073911788720e-02,
       -4.9585186474814164e-02, -9.9831478812557861e-01,
       3.0147853854615381e-02, 4.0710376047691219e-02, 0., 0., 0., 1. ]

#Multiple thread support
multiple_thread: 1
use_gpu: 1
# use_gpu_acc_flow: 0
#feature traker paprameters
max_cnt: 150            # max feature number in feature tracking
min_dist: 30            # min distance between two features 
freq: 10                # frequence (Hz) of publish tracking result. At least 10Hz for good estimation. If set 0, the frequence will be same as raw image 
F_threshold: 1.0        # ransac threshold (pixel)
# show_track: 0          # publish tracking image as topic
# flow_back: 0           # perform forward and backward optical flow to improve feature tracking accuracy

#optimization parameters
max_solver_time: 0.04  # max solver itration time (ms), to guarantee real time
max_num_iterations: 8   # max solver itrations, to guarantee real time
keyframe_parallax: 10.0 # keyframe selection threshold (pixel)

#imu parameters       The more accurate parameters you provide, the better performance
acc_n: 0.1          # accelerometer measurement noise standard deviation. #0.2   0.04
gyr_n: 0.01         # gyroscope measurement noise standard deviation.     #0.05  0.004
acc_w: 0.001         # accelerometer bias random work noise standard deviation.  #0.002
gyr_w: 0.0001       # gyroscope bias random work noise standard deviation.     #4.0e-5
g_norm: 9.805         # gravity magnitude

#unsynchronization parameters
estimate_td: 1                      # online estimate time offset between camera and imu
td: 0                            # initial value of time offset. unit: s. readed image clock + td = real image clock (IMU clock)

#visualization parameters
save_image: 0                   # save image in pose graph for visualization prupose; you can close this function by setting 0 
#visualize_imu_forward: 1        # output imu forward propogation to achieve low latency and high frequence results
#visualize_camera_size: 0.4      # size of camera marker in RVIZ
